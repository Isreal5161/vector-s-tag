<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Vector's Tag builds vintage smart menswear from scratch using distinctive materials for wholesale and direct clients."
		/>
		<script>
			(function () {
				var storageKey = "vector-mobile-desktop-first-visit";
				var isSmallScreen = window.matchMedia && window.matchMedia("(max-width: 760px)").matches;
				var hasSeenSite = false;

				try {
					hasSeenSite = window.localStorage.getItem(storageKey) === "seen";
				} catch (error) {
					hasSeenSite = false;
				}

				if (!isSmallScreen || hasSeenSite) {
					return;
				}

				var viewport = document.querySelector('meta[name="viewport"]');

				if (viewport) {
					viewport.setAttribute("content", "width=1280, initial-scale=1.0");
				}

				try {
					window.localStorage.setItem(storageKey, "seen");
				} catch (error) {
				}
			})();
		</script>
		<title>Vector's Tag</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
